<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>NovaPay — Premium Banking</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,300&family=DM+Mono:wght@300;400;500&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --crimson:#C41E3A;--crimson-light:#E8334A;--crimson-dark:#8B0000;--crimson-glow:rgba(196,30,58,0.35);
  --gold:#C9A84C;--gold-light:#E8C96A;--gold-pale:rgba(201,168,76,0.12);
  --ink:#080808;--ink-2:#0F0F0F;--ink-3:#161616;--ink-4:#1E1E1E;--ink-5:#282828;
  --glass:rgba(255,255,255,0.04);--glass-2:rgba(255,255,255,0.07);--glass-border:rgba(255,255,255,0.08);--glass-border-2:rgba(255,255,255,0.12);
  --text-1:#F5F0EB;--text-2:#A89F95;--text-3:#6B6560;--text-4:#3D3A37;
  --green:#1DB954;--green-dim:rgba(29,185,84,0.15);
  --red-soft:#F87171;--red-dim:rgba(248,113,113,0.12);
  --blue:#4A9EFF;
  --r:20px;--r-lg:24px;--r-xl:32px;
  --shadow-card:0 32px 80px rgba(0,0,0,0.7),0 8px 24px rgba(0,0,0,0.4);
  --shadow-glow:0 0 60px var(--crimson-glow);
  --font-display:'Playfair Display',serif;
  --font-body:'DM Sans',sans-serif;
  --font-mono:'DM Mono',monospace;
  --ease-out:cubic-bezier(0.16,1,0.3,1);
  --ease-spring:cubic-bezier(0.34,1.56,0.64,1);
}
html{overflow-x:hidden;scroll-behavior:smooth}
body{background:var(--ink);color:var(--text-1);font-family:var(--font-body);font-size:15px;line-height:1.5;overflow-x:hidden;-webkit-font-smoothing:antialiased}
::selection{background:var(--crimson-dark);color:#fff}
::-webkit-scrollbar{width:2px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--text-4);border-radius:99px}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes riseUp{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes slideDown{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
@keyframes shimmerCard{0%{transform:translateX(-100%) skewX(-12deg)}100%{transform:translateX(200%) skewX(-12deg)}}
@keyframes scanLine{0%{top:5%;opacity:0}10%{opacity:1}90%{opacity:1}100%{top:95%;opacity:0}}
@keyframes ringRotate{from{transform:rotate(0)}to{transform:rotate(360deg)}}
@keyframes popIn{0%{transform:scale(0.6);opacity:0}70%{transform:scale(1.08)}100%{transform:scale(1);opacity:1}}
@keyframes shakeX{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-10px)}40%,80%{transform:translateX(10px)}}
@keyframes floatY{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes orb1{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(40px,-30px) scale(1.1)}66%{transform:translate(-20px,20px) scale(0.95)}}
@keyframes orb2{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(-30px,20px) scale(0.9)}66%{transform:translate(20px,-40px) scale(1.05)}}
@keyframes navDot{from{transform:scaleX(0)}to{transform:scaleX(1)}}
@keyframes toastSlide{from{transform:translateX(120%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes frozenPulse{0%,100%{filter:grayscale(0.9) brightness(0.7)}50%{filter:grayscale(0.95) brightness(0.6)}}

/* ── PASSWORD GENERATOR ── */
@keyframes pwdBtnPop{0%{transform:scale(1)}40%{transform:scale(0.93)}70%{transform:scale(1.06)}100%{transform:scale(1)}}
@keyframes pwdReveal{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}

.pwd-gen-btn{
  width:100%;height:40px;margin-top:8px;
  border:1px dashed rgba(196,30,58,0.4);border-radius:11px;
  background:rgba(196,30,58,0.06);
  color:var(--crimson-light);font-family:var(--font-body);
  font-size:12px;font-weight:600;letter-spacing:0.4px;
  cursor:pointer;transition:all 0.2s var(--ease-out);
  display:flex;align-items:center;justify-content:center;gap:7px;
}
.pwd-gen-btn:hover{background:rgba(196,30,58,0.12);border-color:rgba(196,30,58,0.6);transform:translateY(-1px)}
.pwd-gen-btn.fired{animation:pwdBtnPop 0.35s var(--ease-spring);border-style:solid;border-color:var(--crimson);color:#fff}

.pwd-gen-preview{
  margin-top:10px;
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:12px;padding:11px 14px;
  display:flex;align-items:center;gap:10px;
  animation:pwdReveal 0.25s var(--ease-out);
}
.pwd-gen-value{
  flex:1;font-family:var(--font-mono);font-size:13px;
  color:var(--text-1);word-break:break-all;line-height:1.4;letter-spacing:0.4px;
}
.pwd-copy-btn{
  flex-shrink:0;width:32px;height:32px;border-radius:9px;
  background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);
  color:var(--text-2);cursor:pointer;font-size:14px;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.18s;
}
.pwd-copy-btn:hover{background:rgba(196,30,58,0.15);border-color:var(--crimson);color:var(--crimson-light)}
.pwd-copy-btn.ok{background:rgba(29,185,84,0.12);border-color:rgba(29,185,84,0.4);color:var(--green)}

.pwd-strength{margin-top:8px;animation:pwdReveal 0.2s var(--ease-out)}
.pwd-strength-bar{height:4px;background:rgba(255,255,255,0.06);border-radius:99px;overflow:hidden;margin-bottom:5px}
.pwd-strength-fill{height:100%;border-radius:99px;transition:width 0.5s var(--ease-out),background 0.3s ease}
.pwd-strength-label{font-size:10px;font-weight:700;letter-spacing:0.8px;text-transform:uppercase}
.pwd-strength-label.weak{color:#F87171}
.pwd-strength-label.medium{color:#F59E0B}
.pwd-strength-label.strong{color:var(--green)}

/* ── LAYOUT ── */
#root{min-height:100vh;display:flex;flex-direction:column}
.app-shell{min-height:100vh;background:var(--ink);position:relative;overflow:hidden}
.mesh-bg{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.mesh-orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:0.18;will-change:transform}
.mesh-orb-1{width:500px;height:500px;background:radial-gradient(circle,#8B0000,transparent 70%);top:-100px;left:-100px;animation:orb1 18s ease-in-out infinite}
.mesh-orb-2{width:400px;height:400px;background:radial-gradient(circle,#C41E3A,transparent 70%);bottom:-80px;right:-80px;animation:orb2 22s ease-in-out infinite}
.mesh-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,0.015) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.015) 1px,transparent 1px);background-size:48px 48px}
.page{position:relative;z-index:1;max-width:430px;margin:0 auto;min-height:100vh}
.auth-page{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.auth-panel{width:100%;max-width:400px;background:linear-gradient(145deg,rgba(22,22,22,0.98),rgba(14,14,14,0.98));border:1px solid var(--glass-border);border-radius:var(--r-xl);padding:40px 36px 36px;backdrop-filter:blur(40px);animation:riseUp 0.5s var(--ease-out) both}
.auth-logo-wrap{width:60px;height:60px;border-radius:18px;background:linear-gradient(135deg,var(--crimson-dark),var(--crimson-light));display:flex;align-items:center;justify-content:center;font-size:26px;margin-bottom:28px;box-shadow:0 0 40px var(--crimson-glow),0 8px 24px rgba(0,0,0,0.5);position:relative;overflow:hidden}
.auth-logo-wrap::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0.15),transparent)}
.auth-heading{font-family:var(--font-display);font-size:30px;font-weight:600;letter-spacing:-0.5px;margin-bottom:6px;color:var(--text-1)}
.auth-sub{color:var(--text-2);font-size:14px;margin-bottom:32px;font-weight:300}
.field{margin-bottom:18px}
.field-label{display:block;font-size:11px;font-weight:600;color:var(--text-2);letter-spacing:1.2px;text-transform:uppercase;margin-bottom:8px}
.field-wrap{position:relative}
.field-input{width:100%;height:52px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.09);border-radius:14px;padding:0 16px;color:var(--text-1);font-family:var(--font-body);font-size:15px;outline:none;transition:border-color 0.2s,box-shadow 0.2s,background 0.2s}
.field-input:focus{border-color:var(--crimson);background:rgba(196,30,58,0.06);box-shadow:0 0 0 3px rgba(196,30,58,0.15)}
.field-input::placeholder{color:var(--text-4)}
.field-input.has-icon{padding-left:46px}
.field-input.has-toggle{padding-right:46px}
.field-icon{position:absolute;left:15px;top:50%;transform:translateY(-50%);color:var(--text-3);font-size:16px;pointer-events:none;transition:color 0.2s}
.field-input:focus+.field-icon,.field-wrap:focus-within .field-icon{color:var(--text-2)}
.field-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-3);cursor:pointer;padding:6px;border-radius:8px;font-size:15px;transition:color 0.2s}
.field-toggle:hover{color:var(--text-2)}
.field-error{font-size:12px;color:var(--red-soft);margin-top:6px;display:flex;align-items:center;gap:5px;animation:slideDown 0.2s ease}
.btn{width:100%;height:52px;border:none;border-radius:14px;font-family:var(--font-body);font-size:15px;font-weight:600;cursor:pointer;transition:all 0.2s var(--ease-out);letter-spacing:0.2px;position:relative;overflow:hidden}
.btn::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0.12),transparent);opacity:0;transition:opacity 0.2s}
.btn:hover::after{opacity:1}
.btn-red{background:linear-gradient(135deg,var(--crimson-dark) 0%,var(--crimson) 60%,var(--crimson-light) 100%);color:#fff;box-shadow:0 4px 20px rgba(196,30,58,0.4)}
.btn-red:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 8px 32px rgba(196,30,58,0.55)}
.btn-red:active:not(:disabled){transform:scale(0.97)}
.btn-red:disabled{opacity:0.35;cursor:not-allowed}
.btn-ghost-sm{background:none;border:none;color:var(--crimson-light);font-family:var(--font-body);font-size:13px;font-weight:500;cursor:pointer;transition:color 0.2s;padding:4px 0}
.btn-ghost-sm:hover{color:#fff}
.btn-outline{background:rgba(255,255,255,0.04);border:1px solid var(--glass-border-2);color:var(--text-2);border-radius:14px;height:48px;font-family:var(--font-body);font-size:14px;font-weight:500;cursor:pointer;transition:all 0.2s;width:100%}
.btn-outline:hover{background:var(--glass-2);color:var(--text-1)}
.auth-footer{text-align:center;color:var(--text-3);font-size:13px;margin-top:20px}
.auth-footer button{background:none;border:none;color:var(--crimson-light);cursor:pointer;font-family:var(--font-body);font-size:13px;font-weight:500;transition:color 0.2s}
.auth-footer button:hover{color:#fff}
.tab-bar{display:flex;gap:4px;background:rgba(255,255,255,0.04);border-radius:12px;padding:4px;margin-bottom:24px;border:1px solid var(--glass-border)}
.tab-btn{flex:1;height:38px;border-radius:9px;border:none;cursor:pointer;font-family:var(--font-body);font-size:13px;font-weight:600;transition:all 0.2s;letter-spacing:0.2px}
.tab-btn.active{background:linear-gradient(135deg,var(--crimson-dark),var(--crimson-light));color:#fff;box-shadow:0 2px 12px rgba(196,30,58,0.4)}
.tab-btn:not(.active){background:transparent;color:var(--text-3)}
.divider-row{display:flex;align-items:center;gap:12px;margin:20px 0}
.divider-line{flex:1;height:1px;background:var(--glass-border)}
.divider-text{font-size:11px;color:var(--text-3);letter-spacing:0.5px}
.notice-box{background:rgba(245,158,11,0.07);border:1px solid rgba(245,158,11,0.2);border-radius:12px;padding:12px 14px;display:flex;gap:10px;margin-bottom:20px}
.notice-box-text{font-size:12px;color:#FCD34D;line-height:1.5}
.privacy-row{background:rgba(29,185,84,0.07);border:1px solid rgba(29,185,84,0.18);border-radius:10px;padding:10px 14px;display:flex;align-items:center;gap:8px;margin-top:16px}
.privacy-row span{font-size:12px;color:#4ADE80;font-weight:500}
.demo-code-box{background:rgba(196,30,58,0.1);border:1px solid rgba(196,30,58,0.25);border-radius:12px;padding:14px 16px;text-align:center;margin-bottom:20px}
.demo-code-box p{color:var(--text-2);font-size:12px;margin-bottom:6px}
.demo-code-val{font-family:var(--font-mono);font-size:28px;font-weight:500;color:var(--crimson-light);letter-spacing:6px}
.otp-row{display:flex;gap:8px;justify-content:center;margin:24px 0}
.otp-box{height:60px;background:rgba(255,255,255,0.04);border:2px solid rgba(255,255,255,0.09);border-radius:14px;text-align:center;font-size:24px;font-weight:600;font-family:var(--font-mono);color:var(--text-1);outline:none;transition:all 0.2s;flex:1;max-width:54px}
.otp-box.filled,.otp-box:focus{border-color:var(--crimson);background:rgba(196,30,58,0.1);box-shadow:0 0 0 3px rgba(196,30,58,0.15)}
.pin-dots{display:flex;gap:18px;justify-content:center;margin:28px 0}
.pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--text-4);transition:all 0.2s var(--ease-spring)}
.pin-dot.active{background:var(--crimson);border-color:var(--crimson);transform:scale(1.15);box-shadow:0 0 12px rgba(196,30,58,0.6)}
.pin-dot.err{background:var(--red-soft);border-color:var(--red-soft);animation:pulse 0.5s ease 3}
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:280px;margin:0 auto}
.numpad-key{height:66px;border-radius:18px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);color:var(--text-1);font-family:var(--font-display);font-size:22px;font-weight:600;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.numpad-key::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at center,rgba(196,30,58,0.3),transparent 70%);opacity:0;transition:opacity 0.2s}
.numpad-key:active::before{opacity:1}
.numpad-key:hover:not(.empty):not(:disabled){background:rgba(196,30,58,0.12);border-color:rgba(196,30,58,0.3);transform:scale(1.04)}
.numpad-key:active:not(.empty){transform:scale(0.93)}
.numpad-key.empty{background:transparent;border:none;cursor:default}
.welcome-hero{text-align:center;padding:60px 0 48px}
.welcome-logo{width:80px;height:80px;border-radius:26px;background:linear-gradient(135deg,var(--crimson-dark),var(--crimson-light));display:flex;align-items:center;justify-content:center;font-size:36px;margin:0 auto 28px;box-shadow:var(--shadow-glow);animation:floatY 4s ease-in-out infinite;position:relative}
.welcome-logo::after{content:'';position:absolute;inset:-3px;border-radius:30px;border:1px solid rgba(196,30,58,0.3);animation:pulse 2s ease infinite}
.welcome-brand{font-family:var(--font-display);font-size:48px;font-weight:700;letter-spacing:-2px;background:linear-gradient(135deg,#fff 30%,var(--crimson-light));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:10px}
.welcome-tag{color:var(--text-2);font-size:15px;font-weight:300;margin-bottom:16px}
.welcome-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(196,30,58,0.1);border:1px solid rgba(196,30,58,0.25);border-radius:99px;padding:5px 14px}
.welcome-badge span{font-size:10px;color:var(--crimson-light);font-weight:700;letter-spacing:1.2px;text-transform:uppercase}
.welcome-actions{display:flex;flex-direction:column;gap:12px;max-width:320px;margin:0 auto}
.welcome-note{text-align:center;font-size:12px;color:var(--text-3);margin-top:24px;line-height:1.7;white-space:pre-line}
.dash-header{display:flex;align-items:center;justify-content:space-between;padding:20px 20px 12px}
.header-greeting-sub{font-size:12px;color:var(--text-3);font-weight:300;letter-spacing:0.3px}
.header-greeting-name{font-size:22px;font-weight:600;letter-spacing:-0.5px;color:var(--text-1)}
.header-avatar{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,var(--crimson-dark),var(--crimson-light));display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;border:none;color:#fff;cursor:pointer;transition:transform 0.2s,box-shadow 0.2s;box-shadow:0 0 0 2px rgba(196,30,58,0.4);font-family:var(--font-body)}
.header-avatar:hover{transform:scale(1.08);box-shadow:0 0 0 3px rgba(196,30,58,0.6)}
.card-outer{padding:0 20px 16px;position:relative}
.card-3d{border-radius:var(--r-xl);padding:26px 24px 22px;position:relative;overflow:hidden;min-height:210px;display:flex;flex-direction:column;justify-content:space-between;box-shadow:var(--shadow-card);transition:filter 0.6s ease,transform 0.3s ease}
.card-3d:hover{transform:translateY(-2px) rotateX(1deg)}
.card-3d.frozen{animation:frozenPulse 2s ease-in-out infinite;cursor:not-allowed}
.card-shine{position:absolute;top:0;left:0;width:60%;height:100%;background:linear-gradient(105deg,transparent 35%,rgba(255,255,255,0.05) 50%,transparent 65%);animation:shimmerCard 4s ease-in-out infinite;pointer-events:none}
.card-noise{position:absolute;inset:0;opacity:0.025;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");pointer-events:none}
.card-frozen-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.45);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;border-radius:var(--r-xl);z-index:5;backdrop-filter:blur(2px)}
.card-frozen-icon{font-size:44px;filter:drop-shadow(0 0 20px rgba(147,197,253,0.8))}
.card-frozen-label{font-size:13px;font-weight:600;color:rgba(255,255,255,0.85);letter-spacing:0.5px}
.card-top-row{display:flex;align-items:center;justify-content:space-between;position:relative;z-index:1}
.card-brand{display:flex;align-items:center;gap:9px}
.card-brand-icon{font-size:22px}
.card-brand-name{font-size:16px;font-weight:700;color:rgba(255,255,255,0.92);letter-spacing:0.5px;font-family:var(--font-display)}
.card-controls{display:flex;align-items:center;gap:8px}
.card-chip{width:38px;height:30px;background:linear-gradient(135deg,#C8A84B,#F0D070,#A87832);border-radius:7px;display:grid;grid-template-columns:1fr 1fr;gap:2px;padding:4px}
.chip-cell{background:rgba(0,0,0,0.22);border-radius:2px}
.card-eye{background:rgba(255,255,255,0.12);border:none;border-radius:10px;width:34px;height:34px;cursor:pointer;color:rgba(255,255,255,0.7);display:flex;align-items:center;justify-content:center;font-size:13px;transition:all 0.2s}
.card-eye:hover{background:rgba(255,255,255,0.2);color:#fff}
.card-balance-area{position:relative;z-index:1;padding:14px 0}
.card-balance-label{color:rgba(255,255,255,0.5);font-size:11px;letter-spacing:0.8px;text-transform:uppercase;margin-bottom:4px;font-weight:400}
.card-balance-amount{font-size:40px;font-weight:700;color:#fff;letter-spacing:-1.5px;line-height:1;font-family:var(--font-display)}
.card-bottom-row{display:flex;align-items:flex-end;justify-content:space-between;position:relative;z-index:1}
.card-num-label{color:rgba(255,255,255,0.35);font-size:9px;letter-spacing:0.8px;margin-bottom:3px}
.card-num{font-family:var(--font-mono);font-size:13px;color:rgba(255,255,255,0.55);letter-spacing:2.5px}

  const enc = new TextEncoder();

};
const otp = (n=6) => { const m=Math.pow(10,n-1); return (Math.floor(Math.random()*9*m)+m).toString(); };

  const d=new Date(ds+"T12:00:00"), now=new Date();
  if(d.toDateString()===now.toDateString()) return lang==="ru"?"Сегодня":"Today";
  const y=new Date(now); y.setDate(y.getDate()-1);
  if(d.toDateString()===y.toDateString()) return lang==="ru"?"Вчера":"Yesterday";

/* ══════════════════════ CBR WIDGET ════════════════════════ */
const CBR_KEY = "npay_cbr_v2";
const CBR_TTL = 24*60*60*1000;
const CBR_FALLBACK = { USD:{value:90.85,prev:91.20}, EUR:{value:98.60,prev:97.95} };

function useCBR() {
  const [data,setData]=useState(null); const [ts,setTs]=useState(null);
  const [loading,setLoading]=useState(true); const [flash,setFlash]=useState(false);
  useEffect(()=>{
    const cached=db.get(CBR_KEY); const now=Date.now();
    if(cached&&(now-cached.ts)<CBR_TTL){setData(cached.rates);setTs(new Date(cached.ts));setLoading(false);return;}
    fetch("https://www.cbr-xml-daily.ru/daily_json.js")
      .then(r=>r.json())
      .then(json=>{
        const prev=cached?.rates||CBR_FALLBACK;
        const fresh={USD:{value:json.Valute.USD.Value,prev:prev.USD?.value||json.Valute.USD.Previous},EUR:{value:json.Valute.EUR.Value,prev:prev.EUR?.value||json.Valute.EUR.Previous}};
        db.set(CBR_KEY,{rates:fresh,ts:now});
        setData(fresh);setTs(new Date(now));setFlash(true);setTimeout(()=>setFlash(false),1500);
      })
      .catch(()=>{const fb=cached?.rates||CBR_FALLBACK;setData(fb);setTs(cached?.ts?new Date(cached.ts):null);})
      .finally(()=>setLoading(false));
  },[]);
  return {data,ts,loading,flash};
}

function AnimNumber({value}) {
  const [disp,setDisp]=useState(value); const prev=useRef(value);
  useEffect(()=>{
    if(prev.current===value)return;
    const from=prev.current,to=value,start=Date.now(),dur=900;
    const step=()=>{const p=Math.min(1,(Date.now()-start)/dur);const e=1-Math.pow(1-p,3);setDisp(from+(to-from)*e);if(p<1)requestAnimationFrame(step);else{setDisp(to);prev.current=to;}};
    requestAnimationFrame(step);
  },[value]);
  return disp.toFixed(2);
}

function DemoQR({tag,size=130}) {
  const cell=Math.floor(size/21);
  const grid=useMemo(()=>{
    const g=Array.from({length:21},()=>Array(21).fill(0));
    [[0,0],[0,14],[14,0]].forEach(([r,c])=>{for(let dr=0;dr<7;dr++)for(let dc=0;dc<7;dc++){if(dr===0||dr===6||dc===0||dc===6||(dr>=2&&dr<=4&&dc>=2&&dc<=4))if(r+dr<21&&c+dc<21)g[r+dr][c+dc]=1;}});
    let h=0;for(const ch of tag)h=(h*31+ch.charCodeAt(0))&0xFFFFFFFF;
    for(let r=0;r<21;r++)for(let c=0;c<21;c++){if(!g[r][c]){h=(h*1664525+1013904223)&0xFFFFFFFF;g[r][c]=(h>>>31)&1;}}
    return g;
  },[tag]);
  return (<svg width={size} height={size} viewBox={`0 0 ${21*cell} ${21*cell}`} style={{display:"block"}}>{grid.map((row,r)=>row.map((v,c)=>v?<rect key={`${r}_${c}`} x={c*cell} y={r*cell} width={cell} height={cell} fill="#111"/>:null))}</svg>);
}

/* ════════════════════════════════════════════════════════════════════
   PASSWORD GENERATOR — new standalone utilities + sub-components
   These are purely additive. No existing code was modified.

const PWD_UPPER  = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
const PWD_LOWER  = "abcdefghijklmnopqrstuvwxyz";
const PWD_DIGITS = "0123456789";
const PWD_SYMS   = "!@#$%^&*-_=+?";

/* Cryptographically-random choice from a character pool */
function randChar(pool) {
  const arr = new Uint32Array(1);
  crypto.getRandomValues(arr);
  return pool[arr[0] % pool.length];
}

/* Generate a 12–16 char password guaranteed to include all 4 classes */
function generateStrongPassword() {
  const len = 12 + (new Uint8Array(1)[0] & 3); // 12–15 via crypto byte
  const all  = PWD_UPPER + PWD_LOWER + PWD_DIGITS + PWD_SYMS;
  // Mandatory representatives
  const required = [
    randChar(PWD_UPPER),
    randChar(PWD_LOWER),
    randChar(PWD_DIGITS),
    randChar(PWD_SYMS),
  ];
  const rest = Array.from({length: len - 4}, () => randChar(all));
  const arr  = [...required, ...rest];
  // Fisher-Yates shuffle using crypto random
  const rnd = new Uint32Array(arr.length);
  crypto.getRandomValues(rnd);
  for (let i = arr.length - 1; i > 0; i--) {
    const j = rnd[i] % (i + 1);
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr.join("");
}

/* Score password and return display metadata */
function scorePassword(pw) {
  if (!pw) return null;
  let s = 0;
  if (pw.length >= 10) s++;
  if (pw.length >= 14) s++;
  if (/[A-Z]/.test(pw)) s++;
  if (/[a-z]/.test(pw)) s++;
  if (/[0-9]/.test(pw)) s++;
  if (/[^A-Za-z0-9]/.test(pw)) s++;
  if (s <= 2) return { label:"Weak",   pct:26,  cls:"weak",   color:"#F87171" };
  if (s <= 4) return { label:"Medium", pct:60,  cls:"medium", color:"#F59E0B" };
                return { label:"Strong",pct:100, cls:"strong", color:"var(--green)" };
}

/* Inline strength bar — shown under the password input whenever there is a value */
function PasswordStrengthBar({ password }) {
  const info = scorePassword(password);
  if (!info) return null;
  return (
    <div className="pwd-strength">
      <div className="pwd-strength-bar">
        <div className="pwd-strength-fill" style={{ width:`${info.pct}%`, background:info.color }}/>
      </div>
      <span className={`pwd-strength-label ${info.cls}`}>{info.label}</span>
    </div>
  );
}

/* The generator widget: button + preview row with copy */
function PasswordGenerator({ onUse }) {
  const [preview, setPreview] = useState("");
  const [copied,  setCopied]  = useState(false);
  const [fired,   setFired]   = useState(false);

  const handleGenerate = () => {
    const pw = generateStrongPassword();
    setPreview(pw);
    onUse(pw);            // push value up to Register state
    setCopied(false);
    // Trigger button pop animation
    setFired(true);
    setTimeout(() => setFired(false), 380);
  };

  const handleCopy = () => {
    if (!preview) return;
    navigator.clipboard?.writeText(preview).catch(() => {});
    setCopied(true);
    setTimeout(() => setCopied(false), 2000);
  };

  return (
    <div>
      {/* Generate button */}
      <button
        type="button"
        className={`pwd-gen-btn${fired ? " fired" : ""}`}
        onClick={handleGenerate}
      >
        <span style={{fontSize:14}}>✨</span>
        <span>Generate Password</span>
      </button>

      {/* Preview + copy — only visible after first generation */}
      {preview && (
        <div className="pwd-gen-preview">
          <span className="pwd-gen-value">{preview}</span>
          <button
            type="button"
            className={`pwd-copy-btn${copied ? " ok" : ""}`}
            onClick={handleCopy}
            title="Copy to clipboard"
          >
            {copied ? "✓" : "📋"}
          </button>
        </div>
      )}
    </div>
  );
}

function SmsStep({phone,user,onVerified,onBack,t}) {
  const len=useMemo(()=>5+Math.round(Math.random()),[]);
  const CODE=useMemo(()=>otp(len),[len]);
  const [digits,setDigits]=useState(Array(len).fill(""));
  const [err,setErr]=useState(""); const [ok,setOk]=useState(false);
  const [busy,setBusy]=useState(false); const [tries,setTries]=useState(0);
  const [cd,setCd]=useState(60); const [locked,setLocked]=useState(false);
  const refs=useRef([]);
  useEffect(()=>{refs.current[0]?.focus();},[]);
  useEffect(()=>{if(cd<=0)return;const ti=setInterval(()=>setCd(c=>c-1),1000);return()=>clearInterval(ti);},[cd]);
  const doVerify=async(val)=>{
    setBusy(true);await new Promise(r=>setTimeout(r,600));
    if(val===CODE){setOk(true);setTimeout(()=>onVerified(user),500);}
    else{const na=tries+1;setTries(na);if(na>=5){setLocked(true);setErr(t.tooMany);}else setErr(t.wrongCode.replace("{n}",5-na));setDigits(Array(len).fill(""));setBusy(false);setTimeout(()=>refs.current[0]?.focus(),40);}
  };
  const onDigit=(i,val)=>{if(locked||busy)return;const v=val.replace(/\D/g,"").slice(-1);const next=[...digits];next[i]=v;setDigits(next);setErr("");if(v&&i<len-1)refs.current[i+1]?.focus();if(next.every(d=>d))doVerify(next.join(""));};
  const onKey=(i,e)=>{if(e.key==="Backspace"&&!digits[i]&&i>0)refs.current[i-1]?.focus();};
  const onPaste=(e)=>{e.preventDefault();const p=e.clipboardData.getData("text").replace(/\D/g,"").slice(0,len);if(!p)return;const next=Array(len).fill("");p.split("").forEach((c,i)=>{next[i]=c;});setDigits(next);if(p.length===len)doVerify(p);else refs.current[p.length]?.focus();};
  return (
    <div className="auth-page">
      <div className="auth-panel">
        <button className="btn-ghost-sm" onClick={onBack} style={{marginBottom:16,fontSize:18}}>← Back</button>
        <div style={{textAlign:"center",marginBottom:8}}>
          <div style={{fontSize:44,marginBottom:12}}>{ok?"✅":busy?"⏳":"💬"}</div>
          <div className="auth-heading">{t.enterCode}</div>
          <div className="auth-sub">Sent to <strong style={{color:"var(--text-1)"}}>{maskPhone(phone)}</strong></div>
        </div>
        <div className="demo-code-box"><p>{t.demoCode}</p><div className="demo-code-val">{CODE}</div></div>
        <div className="otp-row">
          {digits.map((d,i)=>(
            <input key={i} ref={el=>refs.current[i]=el} className={`otp-box${d?" filled":""}`}
              type="text" inputMode="numeric" maxLength={2} value={d}
              onChange={e=>onDigit(i,e.target.value)} onKeyDown={e=>onKey(i,e)} onPaste={onPaste}
              disabled={busy||ok||locked} style={{width:len===6?44:52,borderColor:err?"var(--crimson)":d?"var(--crimson)":undefined,opacity:locked?0.35:1}}/>
          ))}
        </div>
        {busy&&<div style={{display:"flex",justifyContent:"center",margin:"8px 0 14px"}}><div style={{width:20,height:20,borderRadius:"50%",border:"2px solid rgba(196,30,58,0.2)",borderTopColor:"var(--crimson)",animation:"spin 0.7s linear infinite"}}/></div>}
        {err&&!busy&&<div className="field-error mb-3" style={{justifyContent:"center"}}>⚠ {err}</div>}
        <div style={{textAlign:"center",marginTop:8}}>
          {cd>0&&!locked?<span style={{fontSize:13,color:"var(--text-3)"}}>{t.resendIn} <strong style={{color:"var(--text-2)",fontFamily:"var(--font-mono)"}}>{cd}s</strong></span>:<button className="btn-ghost-sm" onClick={()=>{setDigits(Array(len).fill(""));setErr("");setTries(0);setLocked(false);setCd(60);setTimeout(()=>refs.current[0]?.focus(),40);}}>{t.resend}</button>}
        </div>
        <div className="privacy-row mt-4"><span>🔒</span><span>{t.noData}</span></div>
      </div>
    </div>
  );
}

function OtpStep({email,onDone,onBack,t}) {
  const CODE=useMemo(()=>otp(6),[]);
  const [digits,setDigits]=useState(Array(6).fill(""));
  const [err,setErr]=useState(""); const [ok,setOk]=useState(false);
  const [cd,setCd]=useState(60); const refs=useRef([]);
  useEffect(()=>{const ti=cd>0&&setInterval(()=>setCd(c=>c-1),1000);return()=>ti&&clearInterval(ti);},[cd]);
  const onDigit=(i,val)=>{
    const v=val.replace(/\D/g,"").slice(-1);const next=[...digits];next[i]=v;setDigits(next);
    if(v&&i<5)refs.current[i+1]?.focus();
    if(next.every(d=>d)){setTimeout(async()=>{await new Promise(r=>setTimeout(r,500));if(next.join("")===CODE){setOk(true);setTimeout(onDone,500);}else{setErr("Wrong code. Try again.");setDigits(Array(6).fill(""));refs.current[0]?.focus();}},0);}
  };
  const onKey=(i,e)=>{if(e.key==="Backspace"&&!digits[i]&&i>0)refs.current[i-1]?.focus();};
  const masked=email.replace(/(.{2})(.*)(@.*)/,"$1***$3");
  return (
    <div className="auth-page">
      <div className="auth-panel">
        <button className="btn-ghost-sm" onClick={onBack} style={{marginBottom:16,fontSize:18}}>← Back</button>
        <div style={{textAlign:"center",marginBottom:8}}>
          <div style={{fontSize:40,marginBottom:12}}>{ok?"✅":"📨"}</div>
          <div className="auth-heading">Verify Email</div>
          <div className="auth-sub">Code sent to {masked}</div>
        </div>
        <div className="demo-code-box"><p>{t.demoCode}</p><div className="demo-code-val">{CODE}</div></div>
        <div className="otp-row">
          {digits.map((d,i)=>(
            <input key={i} ref={el=>refs.current[i]=el} className={`otp-box${d?" filled":""}`} type="text" inputMode="numeric" maxLength={2} value={d} onChange={e=>onDigit(i,e.target.value)} onKeyDown={e=>onKey(i,e)}/>
          ))}
        </div>
        {err&&<div className="field-error mb-3" style={{justifyContent:"center"}}>⚠ {err}</div>}
        <div style={{textAlign:"center",color:"var(--text-3)",fontSize:13}}>
          {cd>0?`Resend in ${cd}s`:<button className="btn-ghost-sm" onClick={()=>{setCd(60);setDigits(Array(6).fill(""));}}>Resend Code</button>}
        </div>
        <div className="privacy-row mt-4"><span>🔒</span><span>{t.noData}</span></div>
      </div>
    </div>
  );
}

function PinPad({mode,stored,onDone,onCancel,t}) {
  const [pin,setPin]=useState(""); const [conf,setConf]=useState("");
  const [step,setStep]=useState("enter"); const [err,setErr]=useState(""); const [shake,setShake]=useState(false);
  const cur=step==="enter"?pin:conf; const setCur=step==="enter"?setPin:setConf;
  const doShake=()=>{setShake(true);setTimeout(()=>setShake(false),500);};
  useEffect(()=>{
    if(cur.length!==4)return;
    const go=async()=>{
      if(mode==="verify"){await new Promise(r=>setTimeout(r,180));if(cur===stored)onDone(cur);else{setErr(t.pinWrong);setCur("");doShake();setTimeout(()=>setErr(""),2200);}}
      else{if(step==="enter")setStep("confirm");else{if(pin===conf)onDone(pin);else{setErr(t.pinMis);setConf("");doShake();setTimeout(()=>setErr(""),2200);}}}
    };go();
  },[cur]);
  const title=mode==="create"?(step==="enter"?t.pinCreate:t.pinConfirm):t.pinEnter;
  const sub=mode==="create"?t.pinHint:t.pinEnterHint;
  return (

        <div className="pin-dots" style={{animation:shake?"shakeX 0.5s ease":"none"}}>

        {err&&<div className="field-error" style={{justifyContent:"center",marginBottom:14}}>⚠ {err}</div>}

            <button key={i} className={`numpad-key ${k===""?"empty":""}`}

        {onCancel&&<button className="btn-ghost-sm mt-4" onClick={onCancel} style={{display:"block",margin:"18px auto 0"}}>Cancel</button>}

function Analytics({txs,sym,t}) {
  const income=txs.filter(x=>x.type==="income").reduce((s,x)=>s+x.amount,0);
  const expense=txs.filter(x=>x.type==="expense").reduce((s,x)=>s+x.amount,0);
  const net=income-expense;
  const catMap={};txs.filter(x=>x.type==="expense").forEach(x=>{catMap[x.category]=(catMap[x.category]||0)+x.amount;});
  const cats=Object.entries(catMap).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const maxCat=Math.max(...cats.map(c=>c[1]),1);
  const COLORS=["#C41E3A","#E8334A","#F97316","#EAB308","#A855F7","#3B82F6"];
  const weeks=Array.from({length:4},(_,i)=>{const now=new Date(),ws=new Date(now),we=new Date(now);ws.setDate(ws.getDate()-(i+1)*7);we.setDate(we.getDate()-i*7);const wt=txs.filter(x=>{const d=new Date(x.date);return d>=ws&&d<we;});return{label:`W${4-i}`,i:wt.filter(x=>x.type==="income").reduce((s,x)=>s+x.amount,0),e:wt.filter(x=>x.type==="expense").reduce((s,x)=>s+x.amount,0)};}).reverse();
  const maxW=Math.max(...weeks.flatMap(w=>[w.i,w.e]),1);
  return (
    <div className="fade-up">
      <div style={{padding:"18px 20px 12px",fontFamily:"var(--font-display)",fontSize:22,fontWeight:600,letterSpacing:-0.5}}>{t.analyticsTitle}</div>

          <div className="stat-card"><div className="stat-label">{t.expLabel}</div><div className="stat-val r">{fmt(expense,sym)}</div></div>
          <div className="stat-card"><div className="stat-label">{t.netLabel}</div><div className="stat-val" style={{color:net>=0?"var(--green)":"var(--red-soft)"}}>{fmt(net,sym)}</div></div>
          <div className="stat-card"><div className="stat-label">{t.txCount}</div><div className="stat-val w">{txs.length}</div></div>
        </div>
        <div className="glass-panel mb-3" style={{padding:"16px 18px"}}>
          <div className="section-title mb-2" style={{fontSize:14}}>{t.weekly}</div>
          <div className="bar-wrap">{weeks.map((w,i)=>(<div key={i} className="bar-group"><div className="bar-col in" style={{height:`${(w.i/maxW)*88}%`}}/><div className="bar-col ex" style={{height:`${(w.e/maxW)*88}%`}}/></div>))}</div>
          <div className="bar-labels">{weeks.map((w,i)=><div key={i} className="bar-label">{w.label}</div>)}</div>
          <div style={{display:"flex",gap:14,justifyContent:"center",marginTop:10}}>{[["in",t.incomeLabel],["ex",t.expLabel]].map(([cl,lb])=>(<div key={lb} style={{display:"flex",alignItems:"center",gap:5,fontSize:11,color:"var(--text-3)"}}><div className={`bar-col ${cl}`} style={{width:10,height:10,borderRadius:3,minHeight:0}}/>{lb}</div>))}</div>
        </div>
        {cats.length>0&&(<div className="glass-panel" style={{padding:"16px 18px"}}><div className="section-title mb-3" style={{fontSize:14}}>{t.topCats}</div>{cats.map(([cat,amt],i)=>(<div key={cat} className="cat-row"><div className="cat-head"><span className="cat-name">{cat}</span><span className="cat-val" style={{color:COLORS[i]}}>{fmt(amt,sym)}</span></div><div className="prog-bar"><div className="prog-fill" style={{width:`${(amt/maxCat)*100}%`,background:`linear-gradient(90deg,${COLORS[i]}80,${COLORS[i]})`}}/></div></div>))}</div>)}
      </div>
    </div>
  );
}

            <div className="corner tl"/><div className="corner tr"/><div className="corner bl"/><div className="corner br"/>
          </div>
          {scanning&&(<div style={{maxWidth:220,margin:"0 auto 18px"}}><div style={{fontSize:13,color:"var(--text-3)",marginBottom:6}}>{t.scanning_} {pct}%</div><div className="prog-bar"><div className="prog-fill" style={{width:`${pct}%`,background:"linear-gradient(90deg,var(--crimson-dark),var(--crimson-light))"}}/></div></div>)}
          <div style={{fontSize:12,color:"var(--text-3)",marginBottom:18}}>{camOn?t.faceHint:t.camUnavail}</div>
          {!scanning&&<button className="btn btn-red" onClick={startScan} style={{maxWidth:240,margin:"0 auto",display:"block"}}>{t.startScan}</button>}
          <div className="privacy-row mt-4"><span>🔒</span><span>{t.noData}</span></div>
        </div>)}
        {step===2&&(<div className="text-center fade-up" style={{padding:"20px 0"}}>
          <div className="success-circle" style={{fontSize:40}}>✅</div>
          <div className="auth-heading" style={{fontSize:22}}>{t.kycDone}</div>
          <div className="auth-sub">{t.kycOk}</div>
          <div className="glass-panel glass-panel-pad mt-4" style={{textAlign:"left"}}>{[["Status","✅ Verified (Demo)"],["Name",`${form.fn} ${form.ln}`],["Type","Passport / ID"],["Time",new Date().toLocaleTimeString()]].map(([k,v])=>(<div key={k} className="review-row"><span className="review-key">{k}</span><span className="review-val">{v}</span></div>))}</div>
          <div className="privacy-row mt-4"><span>🔒</span><span>{t.noData}</span></div>
          <button className="btn-outline mt-4" onClick={()=>{setStep(0);setPct(0);setScanning(false);setForm({fn:"",ln:"",dob:"",pass:""});}}>{t.resetDemo}</button>
        </div>)}
      </div>
    </div>
  );
}

function Settings({user,onLogout,onCustomize,lang,setLang,currency,setCurrency,t}) {
  const [notif,setNotif]=useState(true); const [bio,setBio]=useState(false);
  return (
    <div className="fade-up">
      <div style={{padding:"18px 20px 12px",fontFamily:"var(--font-display)",fontSize:22,fontWeight:600,letterSpacing:-0.5}}>{t.settingsTitle}</div>
      <div className="section">
        <div className="settings-profile">
          <div className="settings-profile-av">{user.fn?.[0]||"U"}{user.ln?.[0]||""}</div>
          <div><div className="settings-profile-name">{user.fn} {user.ln}</div><div className="settings-profile-email">{user.email}</div><div className="settings-profile-badge"><span>✓ ACTIVE</span></div></div>
        </div>
        <div className="glass-panel mb-3">
          <div className="lang-curr-row"><div className="settings-row-icon" style={{background:"rgba(255,255,255,0.05)"}}>🌐</div><span className="settings-row-label">{t.langLabel}</span><div style={{display:"flex",gap:5}}>{["en","ru"].map(l=><button key={l} className={`pill${lang===l?" on":""}`} onClick={()=>setLang(l)}>{l.toUpperCase()}</button>)}</div></div>
          <div className="lang-curr-row" style={{borderBottom:"none"}}><div className="settings-row-icon" style={{background:"rgba(255,255,255,0.05)"}}>💱</div><span className="settings-row-label">{t.currLabel}</span><div style={{display:"flex",gap:5}}>{Object.entries(CURRENCIES).map(([code,sym])=>(<button key={code} className={`pill${currency===code?" on":""}`} onClick={()=>setCurrency(code)}>{sym}</button>))}</div></div>
        </div>
        <div className="glass-panel mb-3" style={{padding:"0 2px"}}>
          {[{icon:"👤",label:t.profileLabel,value:`${user.fn} ${user.ln}`},{icon:"🎨",label:t.appearLabel,value:t.customizeLabel,fn:onCustomize},{icon:"🔔",label:t.notifLabel,tog:notif,onTog:()=>setNotif(v=>!v)},{icon:"🔐",label:t.bioLabel,tog:bio,onTog:()=>setBio(v=>!v)},{icon:"📊",label:t.versionLabel,value:"NovaPay v4.0"},].map((item,i)=>(
            <button key={i} className="settings-row" onClick={item.fn||undefined} style={{cursor:item.fn?"pointer":"default",border:"none",borderBottom:i<4?"1px solid rgba(255,255,255,0.04)":"none",width:"100%"}}>
              <div className="settings-row-icon">{item.icon}</div>
              <span className="settings-row-label">{item.label}</span>
              {item.tog!==undefined?<button className={`toggle-sw${item.tog?" on":""}`} onClick={e=>{e.stopPropagation();item.onTog();}}/>:item.value&&<span className="settings-row-value">{item.value}</span>}
              {item.fn&&<span className="settings-row-arrow">›</span>}
            </button>
          ))}
        </div>
        <div className="glass-panel" style={{padding:"0 2px"}}>
          <button className="settings-row danger" onClick={onLogout} style={{border:"none",borderBottom:"1px solid rgba(255,255,255,0.04)",width:"100%",cursor:"pointer"}}><div className="settings-row-icon">🚪</div><span className="settings-row-label">{t.signout}</span><span className="settings-row-arrow">›</span></button>
          <button className="settings-row danger" onClick={()=>{if(window.confirm(t.deleteConfirm)){db.del("np_users");db.del("np_session");window.location.reload();}}} style={{border:"none",width:"100%",cursor:"pointer"}}><div className="settings-row-icon">🗑</div><span className="settings-row-label">{t.deleteAcc}</span><span className="settings-row-arrow">›</span></button>
        </div>
        <p style={{textAlign:"center",fontSize:11,color:"var(--text-4)",marginTop:20,lineHeight:1.8}}>NovaPay Demo v4.0 · React 18<br/>No real financial services · Educational only</p>
      </div>
    </div>
  );
}

/* ═══════════════════════════ MAIN APP ══════════════════════════ */
function App() {
  const [screen,setScreen]=useState("welcome");
  const [pending,setPending]=useState(null);
  const [phoneUser,setPhoneUser]=useState(null); const [phoneNum,setPhoneNum]=useState("");
  const [user,setUser]=useState(null); const [txs,setTxs]=useState([]);
  const [view,setView]=useState("home"); const [modal,setModal]=useState(null);
  const [theme,setTheme]=useState("crimson"); const [icon,setIcon]=useState("💎");
  const [frozen,setFrozen]=useState(false); const [lang,setLang]=useState("en");
  const [curr,setCurr]=useState("USD"); const [savings,setSavings]=useState(0);
  const [goal,setGoal]=useState(0); const [toast,setToast]=useState(null);
  const [filter,setFilter]=useState("all");

  const t=L[lang]; const sym=CURRENCIES[curr];
  const showToast=(msg,type="info")=>{setToast({msg,type,key:Date.now()});};

  useEffect(()=>{const s=db.get("np_session");if(s){setUser(s);setScreen("pin");}},[]);

  const initTxs=()=>[{id:"t_init",type:"income",amount:1000,category:"bonus",description:"Welcome bonus",date:today(),icon:"🎁"}];

  const addTx=useCallback((tx)=>{
    const ntx={id:`t${Date.now()}`,...tx};
    setTxs(prev=>[ntx,...prev]);
    setUser(prev=>{
      if(!prev)return prev;
      const nb=tx.type==="income"?prev.balance+tx.amount:prev.balance-tx.amount;
      const upd={...prev,balance:nb};
      db.set("np_session",upd);
      const users=db.get("np_users")||{};
      users[(upd.email||"").toLowerCase()]=upd;
      db.set("np_users",users);
      return upd;
    });
  },[]);

  const moveToSavings=useCallback((n)=>{setSavings(s=>s+n);addTx({type:"expense",amount:n,category:"savings",description:"Moved to savings",icon:"🐷",date:today()});},[addTx]);
  const withdrawSavings=useCallback((n)=>{setSavings(s=>Math.max(0,s-n));addTx({type:"income",amount:n,category:"savings",description:"Withdrawn from savings",icon:"🐷",date:today()});},[addTx]);

  const handleRegister=async(data)=>{setPending(data);setScreen("otp");};
  const handleOtpDone=()=>setScreen("pin_create");
  const handlePinCreate=(pin)=>{
    const nu={fn:pending.fn,ln:pending.ln,email:pending.email,phone:pending.phone,firstName:pending.fn,lastName:pending.ln,hash:pending.hash,pin,balance:1000,cardNumber:"4"+Array.from({length:15},()=>Math.floor(Math.random()*10)).join(""),exp:"12/28",createdAt:new Date().toISOString()};
    const users=db.get("np_users")||{};
    users[nu.email.toLowerCase()]=nu;
    if(nu.phone&&isPhone(nu.phone))users[phoneKey(nu.phone)]=nu;
    db.set("np_users",users);db.set("np_session",nu);
    setUser(nu);setTxs(initTxs());setScreen("app");
  };
  const handleLogin=(u)=>{db.set("np_session",u);setUser(u);setTxs(initTxs());setScreen("pin_verify");};
  const handlePinVerify=()=>setScreen("app");
  const handleLogout=()=>{db.del("np_session");setUser(null);setScreen("welcome");setTxs([]);};

  if(screen!=="app"){
    const authMap={
      welcome:<Welcome onLogin={()=>setScreen("login")} onRegister={()=>setScreen("register")} t={t}/>,
      register:<Register onDone={handleRegister} onBack={()=>setScreen("welcome")} t={t}/>,
      login:<Login onDone={handleLogin} onPhone={()=>setScreen("phone_login")} onBack={()=>setScreen("welcome")} t={t}/>,
      phone_login:<PhoneLogin onSend={(ph,u)=>{setPhoneNum(ph);setPhoneUser(u);setScreen("phone_sms");}} onBack={()=>setScreen("login")} t={t}/>,
      phone_sms:<SmsStep phone={phoneNum} user={phoneUser} onVerified={(u)=>{db.set("np_session",u);setUser(u);setTxs(initTxs());setScreen("pin_verify");}} onBack={()=>setScreen("phone_login")} t={t}/>,
      otp:<OtpStep email={pending?.email} onDone={handleOtpDone} onBack={()=>setScreen("register")} t={t}/>,
      pin_create:<PinPad mode="create" onDone={handlePinCreate} t={t}/>,
      pin_verify:<PinPad mode="verify" stored={user?.pin} onDone={handlePinVerify} onCancel={()=>{db.del("np_session");setScreen("welcome");}} t={t}/>,
      pin:<PinPad mode="verify" stored={user?.pin} onDone={handlePinVerify} onCancel={()=>{db.del("np_session");setScreen("welcome");}} t={t}/>,
    };
    return (<div className="app-shell"><div className="mesh-bg"><div className="mesh-orb mesh-orb-1"/><div className="mesh-orb mesh-orb-2"/><div className="mesh-grid"/></div><div className="page">{authMap[screen]||null}</div></div>);
  }
  if(!user)return null;

  const TxPage=()=>{
    const filtered=txs.filter(tx=>filter==="all"?true:tx.type===filter);
    const grouped=filtered.reduce((acc,tx)=>{const lb=fmtDate(tx.date,lang);if(!acc[lb])acc[lb]=[];acc[lb].push(tx);return acc;},{});
    return (
      <div className="fade-up">
        <div style={{padding:"18px 20px 12px",fontFamily:"var(--font-display)",fontSize:22,fontWeight:600,letterSpacing:-0.5}}>{t.txTitle}</div>
        <div className="section">
          <div style={{fontSize:12,color:"var(--text-3)",marginBottom:14}}>{txs.length} {t.totalRecords}</div>
          <div className="filter-pills">{[["all",t.allTx],["income",t.incTx],["expense",t.expTx]].map(([id,lb])=>(<button key={id} className={`filter-pill${filter===id?" on":""}`} onClick={()=>setFilter(id)}>{lb}</button>))}</div>
          <div className="glass-panel">{filtered.length===0?<div style={{textAlign:"center",padding:"48px 0",color:"var(--text-3)"}}>No transactions</div>:Object.entries(grouped).map(([lb,tlist])=>(<div key={lb}><div className="tx-group-label">{lb}</div>{tlist.map(tx=><TxRow key={tx.id} tx={tx} sym={sym} lang={lang}/>)}</div>))}</div>
        </div>
      </div>
    );
  };

  const HomeView=()=>(
    <div className="fade-up">
      <div className="dash-header">
        <div><div className="header-greeting-sub">{t.greeting}</div><div className="header-greeting-name">{user.fn} {user.ln}</div></div>
        <button className="header-avatar" onClick={()=>setView("settings")}>{(user.fn||"U")[0]}{(user.ln||"")[0]}</button>
      </div>
      <BalanceCard user={user} theme={theme} icon={icon} frozen={frozen} sym={sym} t={t}/>
      <div className="freeze-btn-row">
        <button className={`freeze-btn${frozen?" frozen-state":""}`} onClick={()=>setFrozen(v=>!v)}>
          {frozen?<>🔓 {t.unfreeze}</>:<>❄️ {t.freeze}</>}
        </button>
      </div>
      {frozen&&(<div style={{margin:"0 20px 14px",background:"rgba(147,197,253,0.06)",border:"1px solid rgba(147,197,253,0.18)",borderRadius:13,padding:"10px 14px",display:"flex",gap:9,alignItems:"flex-start",animation:"riseUp 0.3s var(--ease-out)"}}><span>🔒</span><span style={{fontSize:13,color:"#93C5FD"}}>{t.frozenHint}</span></div>)}
      <CBRWidget t={t}/>
      <div className="qa-section">
        <div className="qa-section-label">Quick Actions</div>
        <div className="qa-grid">
          {[{id:"send",icon:"📤",label:t.send,g:"linear-gradient(135deg,#6B0000,#C41E3A)",gl:"rgba(196,30,58,0.35)",dis:frozen},{id:"recv",icon:"📥",label:t.recv,g:"linear-gradient(135deg,#0A3D20,#1DB954)",gl:"rgba(29,185,84,0.3)"},{id:"topup",icon:"➕",label:t.topup,g:"linear-gradient(135deg,#0A1F3D,#1A6FCC)",gl:"rgba(26,111,204,0.3)"},{id:"xch",icon:"🔄",label:t.exchange,g:"linear-gradient(135deg,#2D0A5A,#7B2FBE)",gl:"rgba(123,47,190,0.3)"},{id:"scan",icon:"📷",label:t.scan,g:"linear-gradient(135deg,#0A2A10,#16A34A)",gl:"rgba(22,163,74,0.3)"},].map(a=>(<button key={a.id} className="qa-btn" disabled={a.dis} onClick={()=>!a.dis&&setModal(a.id)}><div className="qa-icon-wrap" style={{background:a.g,boxShadow:`0 6px 20px ${a.gl}`}}>{a.icon}</div><span className="qa-label">{a.label}</span></button>))}
        </div>
        {frozen&&<div style={{textAlign:"center",fontSize:11,color:"#93C5FD",marginTop:8}}>{t.frozenMsg}</div>}
      </div>
      <div className="section">
        <div className="section-head"><div className="section-title">{t.recentTx}</div><button className="section-action" onClick={()=>setView("history")}>{t.viewAll} →</button></div>
        <div className="glass-panel">{txs.slice(0,5).map(tx=><TxRow key={tx.id} tx={tx} sym={sym} lang={lang}/>)}{txs.length===0&&<div style={{textAlign:"center",padding:"32px 0",color:"var(--text-3)"}}>No transactions yet</div>}</div>
      </div>
    </div>
  );

  const renderView=()=>{
    switch(view){
      case "home": return <HomeView/>;
      case "history": return <TxPage/>;
      case "analytics": return <Analytics txs={txs} sym={sym} t={t}/>;
      case "savings": return <Savings user={user} savings={savings} setSavings={setSavings} goal={goal} setGoal={setGoal} onMove={moveToSavings} onWithdraw={withdrawSavings} sym={sym} t={t} showToast={showToast}/>;
      case "kyc": return <KYC t={t}/>;
      case "settings": return <Settings user={user} onLogout={handleLogout} onCustomize={()=>setModal("customize")} lang={lang} setLang={setLang} currency={curr} setCurrency={setCurr} t={t}/>;
      default: return null;
    }
  };

  const navItems=[{id:"home",icon:"🏠",label:t.navHome},{id:"history",icon:"📋",label:t.navHistory},{id:"analytics",icon:"📊",label:t.navAnalytics},{id:"savings",icon:"🐷",label:t.navSavings},{id:"settings",icon:"⚙️",label:t.navSettings}];

  return (
    <div className="app-shell">
      <div className="mesh-bg"><div className="mesh-orb mesh-orb-1"/><div className="mesh-orb mesh-orb-2"/><div className="mesh-grid"/></div>
      <div className="page">
        {view==="home"&&(<div className="top-controls">{["en","ru"].map(l=><button key={l} className={`pill${lang===l?" on":""}`} onClick={()=>setLang(l)}>{l.toUpperCase()}</button>)}<div style={{width:1,background:"rgba(255,255,255,0.08)",margin:"0 2px"}}/>{Object.entries(CURRENCIES).map(([code,s])=>(<button key={code} className={`pill${curr===code?" on":""}`} onClick={()=>setCurr(code)}>{s}</button>))}</div>)}
        <div className="dash-wrap">{renderView()}</div>
        <nav className="bottom-nav">{navItems.map(n=>(<button key={n.id} className={`nav-btn${view===n.id?" on":""}`} onClick={()=>setView(n.id)}><span className="nav-icon">{n.icon}</span>{n.label}</button>))}</nav>
        {modal==="send"&&!frozen&&<TransferModal user={user} onClose={()=>setModal(null)} onDone={tx=>{addTx(tx);setModal(null);}} sym={sym} t={t}/>}
        {modal==="recv"&&<ReceiveModal user={user} onClose={()=>setModal(null)} t={t}/>}
        {modal==="topup"&&<TopUpModal user={user} onClose={()=>setModal(null)} onAdd={n=>addTx({type:"income",amount:n,category:"top-up",description:"Balance top-up",icon:"💰",date:today()})} t={t}/>}
        {modal==="xch"&&<ExchangeModal onClose={()=>setModal(null)} t={t}/>}
        {modal==="scan"&&<ScanModal onClose={()=>setModal(null)} t={t}/>}
        {modal==="customize"&&<CardCustomizeModal user={user} theme={theme} icon={icon} onTheme={setTheme} onIcon={setIcon} onClose={()=>setModal(null)} t={t}/>}
        {toast&&<Toast key={toast.key} msg={toast.msg} type={toast.type} onDone={()=>setToast(null)}/>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
